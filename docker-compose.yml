version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dclaw_fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dclaw_fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_fleet
      APP_ENV: production
      # Demo mode — set ENABLE_DEMO_MODE=false in production deployments.
      ENABLE_DEMO_MODE: "true"
    ports:
      - "8139:8139"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8139/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8139
    environment:
      PORT: 3053
    ports:
      - "3053:3053"
    depends_on:
      - backend
    healthcheck:
      # Use 127.0.0.1 because /etc/hosts resolves localhost to ::1 first and
      # Next.js standalone binds IPv4 only; busybox wget gets connection
      # refused on the IPv6 attempt without falling through.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3053/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
