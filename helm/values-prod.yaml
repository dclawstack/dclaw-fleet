# Cloud / production overrides. Use with:
#   helm install dclaw-fleet ./helm -n <ns> -f values-prod.yaml
image:
  backend:
    repository: ghcr.io/dclawstack/dclaw-fleet-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/dclawstack/dclaw-fleet-frontend
    tag: latest
    pullPolicy: IfNotPresent
service:
  frontend:
    type: ClusterIP
    port: 3053
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: fleet.dclawstack.io
  tls:
    - secretName: dclaw-fleet-tls
      hosts:
        - fleet.dclawstack.io
